<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #f6f8fb;
        --panel: #ffffff;
        --line: #d8deea;
        --line-soft: #e9edf5;
        --text: #1f2a44;
        --muted: #667085;
        --accent: #24d366;
        --accent-dark: #17b554;
        --danger: #ef4444;
        --tag-bg: #eef4ff;
        --tag-border: #cfe0ff;
        --tag-existing-bg: #f4f7fb;
        --tag-existing-border: #d8e1ef;
        --warning-bg: #fff8e6;
        --warning-border: #f4d58d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      .page {
        max-width: 980px;
        margin: 0 auto;
      }

      .topbar {
        margin-bottom: 16px;
      }

      .title {
        font-size: 24px;
        font-weight: 700;
        margin: 0;
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .cards {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .course-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 4px 12px rgba(16, 24, 40, 0.04);
      }

      .course-card.has-error {
        border-color: #ef4444;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .card-title {
        font-size: 18px;
        font-weight: 700;
      }

      .remove-card-btn {
        border: 1px solid #f0b4b4;
        background: #fff5f5;
        color: #b42318;
        border-radius: 10px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 13px;
      }

      .remove-card-btn:hover {
        background: #ffe9e9;
      }

      .field {
        margin-bottom: 16px;
      }

      .label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
        margin-top: 6px;
      }

      input[type="text"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 14px;
        outline: none;
        background: #fff;
      }

      input[type="text"]:focus {
        border-color: #98b8ff;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
      }

      .tag-panel {
        border: 1px solid var(--line-soft);
        border-radius: 14px;
        background: #fcfdff;
        padding: 14px;
      }

      .tag-group {
        margin-bottom: 16px;
      }

      .tag-group:last-child {
        margin-bottom: 0;
      }

      .group-title {
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .group-hint {
        color: var(--muted);
        font-size: 12px;
        margin-top: -2px;
        margin-bottom: 8px;
      }

      .existing-course-tags-wrap {
        border: 1px solid var(--warning-border);
        background: var(--warning-bg);
        border-radius: 12px;
        padding: 12px;
      }

      .tag-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-height: 20px;
      }

      .tag-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 7px 10px;
        font-size: 13px;
        line-height: 1;
      }

      .tag-chip.existing {
        background: var(--tag-existing-bg);
        border: 1px solid var(--tag-existing-border);
      }

      .tag-chip.new {
        background: var(--tag-bg);
        border: 1px solid var(--tag-border);
      }

      .tag-chip button {
        border: none;
        background: transparent;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        color: #4b5563;
        padding: 0;
      }

      .tag-chip button:hover {
        color: #111827;
      }

      .empty-text {
        color: var(--muted);
        font-size: 13px;
      }

      .search-row {
        margin-bottom: 12px;
      }

      .checkbox-list {
        max-height: 220px;
        overflow-y: auto;
        border: 1px solid var(--line-soft);
        border-radius: 12px;
        background: #fff;
        padding: 8px;
      }

      .checkbox-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 10px;
      }

      .checkbox-item:hover {
        background: #f6f9ff;
      }

      .checkbox-item.hidden {
        display: none;
      }

      .checkbox-item input[type="checkbox"] {
        margin-top: 2px;
      }

      .checkbox-item.disabled-tag {
        background: #f3f4f6;
        opacity: 0.9;
        cursor: default;
      }

      .checkbox-item.disabled-tag:hover {
        background: #f3f4f6;
      }

      .checkbox-item.disabled-tag .checkbox-label {
        color: #6b7280;
      }

      .checkbox-item.disabled-tag input[type="checkbox"] {
        cursor: not-allowed;
      }

      .checkbox-label {
        font-size: 14px;
        word-break: break-word;
      }

      .custom-tag-row {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }

      .custom-tag-row input {
        flex: 1;
      }

      .btn {
        border: none;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-primary:hover {
        background: var(--accent-dark);
      }

      .btn-secondary {
        background: #edf2ff;
        color: #243b6b;
        border: 1px solid #cfe0ff;
      }

      .btn-secondary:hover {
        background: #e3ecff;
      }

      .btn-light {
        background: #fff;
        border: 1px solid var(--line);
        color: var(--text);
      }

      .btn-light:hover {
        background: #f8fafc;
      }

      .bottom-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-top: 18px;
      }

      .left-actions,
      .right-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .status {
        margin-top: 14px;
        min-height: 20px;
        font-size: 13px;
      }

      .status.error {
        color: #b42318;
      }

      .status.success {
        color: #067647;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="topbar">
        <h1 class="title">Назначить теги курсам</h1>
        <div class="subtitle">
          Если ввести ссылку на курс, система попробует найти уже назначенные ему теги по данным листа <b>rubrics_data</b>.
        </div>
      </div>

      <div id="cards" class="cards"></div>

      <div class="bottom-actions">
        <div class="left-actions">
          <button id="addCardBtn" class="btn btn-secondary" type="button">＋ Добавить ещё курс</button>
        </div>

        <div class="right-actions">
          <button id="cancelBtn" class="btn btn-light" type="button">Отмена</button>
          <button id="saveBtn" class="btn btn-primary" type="button">Сохранить</button>
        </div>
      </div>

      <div id="status" class="status"></div>
    </div>

    <script>
      const DIALOG_DATA = <?!= JSON.stringify(dialogData || { availableTags: [], courseTagMap: {} }) ?>;
      const AVAILABLE_TAGS = Array.isArray(DIALOG_DATA.availableTags) ? DIALOG_DATA.availableTags : [];
      const COURSE_TAG_MAP = DIALOG_DATA.courseTagMap || {};

      let cardCounter = 0;

      function escapeHtml(str) {
        return String(str)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function normalizeCourseKeyFromUrl(value) {
        const raw = String(value || '').trim();
        if (!raw.startsWith('https://')) return '';

        const marker = '/education/';
        const markerIndex = raw.indexOf(marker);

        if (markerIndex === -1) return '';

        let key = raw.slice(markerIndex + marker.length);

        // отрезаем query/hash
        key = key.split('?')[0];
        key = key.split('#')[0];

        // убираем хвостовой /
        key = key.replace(/\/+$/, '').trim();

        return key;
      }

      function getExistingCourseTagsByValue(courseValue) {
        const courseKey = normalizeCourseKeyFromUrl(courseValue);
        if (!courseKey) return [];

        return Array.isArray(COURSE_TAG_MAP[courseKey]) ? COURSE_TAG_MAP[courseKey] : [];
      }

      function createCard() {
        cardCounter += 1;
        const cardId = 'card-' + cardCounter;

        const wrapper = document.createElement('div');
        wrapper.className = 'course-card';
        wrapper.dataset.cardId = cardId;

        wrapper.innerHTML = `
          <div class="card-header">
            <div class="card-title">Курс ${cardCounter}</div>
            <button type="button" class="remove-card-btn">Удалить блок</button>
          </div>

          <div class="field">
            <label class="label">Название курса или ссылка</label>
            <input
              type="text"
              class="course-input"
              placeholder="Например: https://online.top-academy.ru/education/python или Python для детей"
            />
            <div class="hint">
              Если значение начинается с <b>https:\/\/</b>, оно сохранится как ссылка. Иначе — как название курса.
            </div>
          </div>

          <div class="field">
            <label class="label">Теги</label>

            <div class="tag-panel">
              <div class="tag-group">
                <div class="group-title">Уже назначенные теги</div>
                <div class="group-hint">
                  Эти теги подтягиваются автоматически по ссылке на курс и показываются только для справки. В <b>new_rubrics</b> они не сохраняются.
                </div>

                <div class="existing-course-tags-wrap">
                  <div class="tag-chips existing-course-tags">
                    <span class="empty-text">Пока не найдено ни одного тега по ссылке курса</span>
                  </div>
                </div>
              </div>

              <div class="tag-group">
                <div class="group-title">Теги для добавления</div>
                <div class="group-hint">
                  Ниже — теги, которые будут записаны в <b>new_rubrics</b> для последующей обработки.
                </div>

                <div class="tag-group" style="margin-bottom: 12px;">
                  <div class="group-title" style="font-size:13px;">Выбранные новые теги</div>
                  <div class="tag-chips selected-new-tags">
                    <span class="empty-text">Пока ничего не выбрано</span>
                  </div>
                </div>

                <div class="search-row">
                  <label class="label" style="margin-bottom: 6px;">Поиск по существующим тегам</label>
                  <input
                    type="text"
                    class="tag-search-input"
                    placeholder="Начните вводить тег..."
                  />
                </div>

                <div class="checkbox-list existing-tags-list"></div>

                <div class="custom-tag-row">
                  <input
                    type="text"
                    class="custom-tag-input"
                    placeholder="Добавить свой тег или несколько тегов через запятую и пробел с большой буквы"
                  />
                  <button type="button" class="btn btn-secondary add-custom-tag-btn">Добавить тег</button>
                </div>

                <div class="group-hint" style="margin-top:10px;">
                  Пользовательские теги сохранятся только в <b>new_rubrics</b> и не будут добавлены в <b>rubrics_data</b>.
                </div>

                <div class="tag-group" style="margin-top: 12px; margin-bottom: 0;">
                  <div class="group-title" style="font-size:13px;">Добавленные пользовательские теги</div>
                  <div class="tag-chips custom-tags-list">
                    <span class="empty-text">Пока нет пользовательских тегов</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;

        attachCardLogic(wrapper);
        return wrapper;
      }

      function attachCardLogic(cardEl) {
        const removeBtn = cardEl.querySelector('.remove-card-btn');
        const courseInput = cardEl.querySelector('.course-input');
        const searchInput = cardEl.querySelector('.tag-search-input');
        const existingTagsList = cardEl.querySelector('.existing-tags-list');
        const selectedNewTagsContainer = cardEl.querySelector('.selected-new-tags');
        const existingCourseTagsContainer = cardEl.querySelector('.existing-course-tags');
        const customInput = cardEl.querySelector('.custom-tag-input');
        const addCustomBtn = cardEl.querySelector('.add-custom-tag-btn');

        // Локальное состояние карточки
        cardEl._state = {
          customTags: [],
          existingCourseTags: []
        };

        // Рендер списка чекбоксов существующих тегов
        existingTagsList.innerHTML = '';
        AVAILABLE_TAGS.forEach(tag => {
          const row = document.createElement('label');
          row.className = 'checkbox-item';
          row.dataset.tag = tag.toLowerCase();

          row.innerHTML = `
            <input type="checkbox" class="tag-checkbox" value="${escapeHtml(tag)}" />
            <span class="checkbox-label">${escapeHtml(tag)}</span>
          `;

          existingTagsList.appendChild(row);
        });

        // Поиск по существующим тегам
        searchInput.addEventListener('input', () => {
          const query = searchInput.value.trim().toLowerCase();
          const rows = existingTagsList.querySelectorAll('.checkbox-item');

          rows.forEach(row => {
            const tag = row.dataset.tag || '';
            row.classList.toggle('hidden', query && !tag.includes(query));
          });
        });

        // Изменение выбранных тегов
        existingTagsList.addEventListener('change', event => {
          if (event.target.classList.contains('tag-checkbox')) {
            renderSelectedNewTags(cardEl);
          }
        });

        // Автопоиск уже назначенных тегов по ссылке
        courseInput.addEventListener('input', () => {
          updateExistingCourseTags(cardEl);
        });

        courseInput.addEventListener('change', () => {
          updateExistingCourseTags(cardEl);
        });

        courseInput.addEventListener('blur', () => {
          updateExistingCourseTags(cardEl);
        });

        // Добавление пользовательского тега / тегов
        addCustomBtn.addEventListener('click', () => {
          addCustomTagToCard(cardEl);
        });

        customInput.addEventListener('keydown', event => {
          if (event.key === 'Enter') {
            event.preventDefault();
            addCustomTagToCard(cardEl);
          }
        });

        // Удаление карточки
        removeBtn.addEventListener('click', () => {
          const cardsContainer = document.getElementById('cards');
          const allCards = cardsContainer.querySelectorAll('.course-card');

          if (allCards.length === 1) {
            setStatus('Нельзя удалить единственный блок. Оставьте хотя бы один.', 'error');
            return;
          }

          cardEl.remove();
          renumberCards();
        });

        renderSelectedNewTags(cardEl);
        renderCustomTags(cardEl);
        renderExistingCourseTags(cardEl);
      }

      function updateExistingCourseTags(cardEl) {
        const courseValue = cardEl.querySelector('.course-input').value.trim();
        cardEl._state.existingCourseTags = getExistingCourseTagsByValue(courseValue);

        renderExistingCourseTags(cardEl);
        syncExistingTagsWithCheckboxes(cardEl);
        renderSelectedNewTags(cardEl);
        renderCustomTags(cardEl);
      }

      function syncExistingTagsWithCheckboxes(cardEl) {
        const existingTags = new Set(
          (cardEl._state.existingCourseTags || []).map(tag => String(tag).trim())
        );

        const checkboxes = Array.from(cardEl.querySelectorAll('.tag-checkbox'));

        checkboxes.forEach(checkbox => {
          const tagValue = String(checkbox.value || '').trim();
          const row = checkbox.closest('.checkbox-item');
          const wasLocked = checkbox.dataset.locked === 'true';

          if (existingTags.has(tagValue)) {
            // Тег уже назначен курсу → блокируем, серим, отмечаем
            checkbox.checked = true;
            checkbox.disabled = true;
            checkbox.dataset.locked = 'true';

            if (row) {
              row.classList.add('disabled-tag');
            }
          } else {
            // Тег больше не является "уже назначенным"
            checkbox.disabled = false;
            checkbox.dataset.locked = 'false';

            // ВАЖНО:
            // если он раньше был автозаблокирован как уже назначенный,
            // снимаем галочку при исчезновении/смене ссылки
            if (wasLocked) {
              checkbox.checked = false;
            }

            if (row) {
              row.classList.remove('disabled-tag');
            }
          }
        });
      }

      function renderExistingCourseTags(cardEl) {
        const container = cardEl.querySelector('.existing-course-tags');
        const tags = cardEl._state.existingCourseTags || [];

        if (!tags.length) {
          container.innerHTML = '<span class="empty-text">Пока не найдено ни одного тега по ссылке курса</span>';
          return;
        }

        container.innerHTML = tags
          .map(tag => `<span class="tag-chip existing">${escapeHtml(tag)}</span>`)
          .join('');
      }

      function renderSelectedNewTags(cardEl) {
        const selectedTagsContainer = cardEl.querySelector('.selected-new-tags');

        const checked = Array.from(cardEl.querySelectorAll('.tag-checkbox:checked'))
          .filter(cb => cb.dataset.locked !== 'true') // не берём уже назначенные теги
          .map(cb => cb.value);

        if (checked.length === 0) {
          selectedTagsContainer.innerHTML = '<span class="empty-text">Пока ничего не выбрано</span>';
          return;
        }

        selectedTagsContainer.innerHTML = checked
          .map(tag => `<span class="tag-chip new">${escapeHtml(tag)}</span>`)
          .join('');
      }

      function renderCustomTags(cardEl) {
        const customTagsContainer = cardEl.querySelector('.custom-tags-list');
        const customTags = cardEl._state.customTags || [];

        if (customTags.length === 0) {
          customTagsContainer.innerHTML = '<span class="empty-text">Пока нет пользовательских тегов</span>';
          return;
        }

        customTagsContainer.innerHTML = customTags
          .map((tag, index) => `
            <span class="tag-chip new">
              ${escapeHtml(tag)}
              <button type="button" data-custom-index="${index}" title="Удалить">×</button>
            </span>
          `)
          .join('');

        customTagsContainer.querySelectorAll('button[data-custom-index]').forEach(btn => {
          btn.addEventListener('click', () => {
            const idx = Number(btn.dataset.customIndex);
            cardEl._state.customTags.splice(idx, 1);
            renderCustomTags(cardEl);
          });
        });
      }

      function addCustomTagToCard(cardEl) {
        const input = cardEl.querySelector('.custom-tag-input');
        const rawValue = input.value.trim();

        if (!rawValue) return;

        const tags = rawValue
          .split(',')
          .map(tag => tag.trim())
          .filter(tag => tag !== '');

        if (tags.length === 0) return;

        cardEl._state.customTags.push(...tags);
        input.value = '';
        renderCustomTags(cardEl);
      }

      function renumberCards() {
        const cards = document.querySelectorAll('.course-card');
        cards.forEach((card, index) => {
          const title = card.querySelector('.card-title');
          title.textContent = 'Курс ' + (index + 1);
        });
      }

      function collectFormData() {
        const cards = Array.from(document.querySelectorAll('.course-card'));

        return cards.map(card => {
          const courseValue = card.querySelector('.course-input').value.trim();

          const selectedExistingTags = Array.from(card.querySelectorAll('.tag-checkbox:checked'))
            .filter(cb => cb.dataset.locked !== 'true') // исключаем уже назначенные теги
            .map(cb => cb.value.trim())
            .filter(Boolean);

          const customTags = (card._state.customTags || [])
            .map(tag => String(tag).trim())
            .filter(Boolean);

          return {
            courseValue,
            tags: [...selectedExistingTags, ...customTags]
          };
        });
      }

      function clearCardErrors() {
        document.querySelectorAll('.course-card').forEach(card => {
          card.classList.remove('has-error');
        });
      }

      function setCardError(cardIndex) {
        const cards = Array.from(document.querySelectorAll('.course-card'));
        if (cards[cardIndex]) {
          cards[cardIndex].classList.add('has-error');
          cards[cardIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }

      function setStatus(message, type = '') {
        const status = document.getElementById('status');
        status.textContent = message || '';
        status.className = 'status' + (type ? ' ' + type : '');
      }

      function validatePayload(payload) {
        if (!payload.items.length) {
          return { ok: false, message: 'Нет блоков для сохранения.' };
        }

        let hasAnyFilledBlock = false;

        for (let i = 0; i < payload.items.length; i++) {
          const item = payload.items[i];
          const courseValue = String(item.courseValue || '').trim();
          const tags = Array.isArray(item.tags) ? item.tags.filter(Boolean) : [];

          const hasCourse = courseValue !== '';
          const hasTags = tags.length > 0;

          if (hasCourse || hasTags) {
            hasAnyFilledBlock = true;
          }

          // Если есть теги, но нет курса — ошибка
          if (!hasCourse && hasTags) {
            return {
              ok: false,
              message: `В блоке "Курс ${i + 1}" указаны теги, но не заполнено название курса или ссылка.`,
              errorCardIndex: i
            };
          }
        }

        if (!hasAnyFilledBlock) {
          return { ok: false, message: 'Заполните хотя бы один курс.' };
        }

        return { ok: true };
      }

      function addCard() {
        const cardsContainer = document.getElementById('cards');
        cardsContainer.appendChild(createCard());
        renumberCards();
      }

      function init() {
        document.getElementById('addCardBtn').addEventListener('click', addCard);

        document.getElementById('cancelBtn').addEventListener('click', () => {
          google.script.host.close();
        });

        document.getElementById('saveBtn').addEventListener('click', () => {
          setStatus('');
          clearCardErrors();

          const payload = {
            items: collectFormData()
          };

          const validation = validatePayload(payload);
          if (!validation.ok) {
            setStatus(validation.message, 'error');

            if (typeof validation.errorCardIndex === 'number') {
              setCardError(validation.errorCardIndex);
            }
            return;
          }

          const saveBtn = document.getElementById('saveBtn');
          saveBtn.disabled = true;
          saveBtn.textContent = 'Сохраняю...';

          google.script.run
            .withSuccessHandler(result => {
              setStatus('Готово: добавлено строк — ' + result.rowsAdded, 'success');
              saveBtn.disabled = false;
              saveBtn.textContent = 'Сохранить';

              setTimeout(() => {
                google.script.host.close();
              }, 900);
            })
            .withFailureHandler(error => {
              const message = error && error.message ? error.message : 'Ошибка при сохранении.';
              setStatus(message, 'error');
              saveBtn.disabled = false;
              saveBtn.textContent = 'Сохранить';
            })
            .saveNewRubrics(payload);
        });

        // Стартуем с одной карточки
        addCard();
      }

      init();
    </script>
  </body>
</html>
